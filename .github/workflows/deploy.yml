name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - uses: actions/configure-pages@v5
      - run: npm install
      - run: npm run build
      - name: Verify built Pages entry
        run: |
          test -f dist/index.html
          grep -q '/chromebook-yolo-object-detector-ja/assets/' dist/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
      - name: Verify deployed URL is reachable
        run: |
          curl --fail --location --retry 5 --retry-delay 5 --silent --show-error \
            "${{ steps.deployment.outputs.page_url }}" \
            | grep -q '<div id="root"></div>'
